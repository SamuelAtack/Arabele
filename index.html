<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabele</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    :root{
      --teal:    #0F6E56;
      --teal-m:  #1D9E75;
      --teal-l:  #9FE1CB;
      --teal-ll: #E1F5EE;
      --cream:   #FAF6EE;
      --parch:   #F2EBD9;
      --sand:    #E0D4BC;
      --ink:     #1C2B26;
      --muted:   #7A8C85;
      --border:  rgba(15,110,86,0.14);
      --serif:   'Cormorant Garamond', Georgia, serif;
      --sc:      'Cormorant SC', Georgia, serif;
    }

    html,body{height:100%}
    body{
      background: var(--cream);
      font-family: var(--serif);
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:0 0 80px;
      position:relative;
      overflow-x:hidden;
      color:var(--ink);
    }

    /* ── STAGE BACKGROUND ── */
    .stage{
      position:fixed;inset:0;
      pointer-events:none;
      z-index:0;
    }

    /* ── APP SHELL ── */
    .app{
      width:100%;
      max-width:720px;
      position:relative;
      z-index:1;
      padding-top:52px;
    }

    /* ── HEADER ── */
    .header{
      text-align:center;
      padding:36px 32px 20px;
    }
    .logo{
      font-family:var(--sc);
      font-size:44px;
      font-weight:300;
      letter-spacing:0.18em;
      color:var(--ink);
      display:inline-block;
      line-height:1;
    }
    .logo-teal{color:var(--teal-m)}
    .logo-ghost{color:var(--teal-m);opacity:0.18;font-style:italic}
    .tagline{
      margin-top:8px;
      font-size:11px;
      letter-spacing:0.24em;
      color:var(--muted);
      font-style:italic;
    }
    .tagline-t{color:var(--teal)}
    .date{
      font-family:var(--sc);
      font-size:10px;
      letter-spacing:0.1em;
      color:var(--muted);
      margin-top:12px;
      display:block;
    }

    /* ── THIN RULE ── */
    .rule{height:1px;background:linear-gradient(to right,transparent,var(--teal-l),transparent);margin:0 32px}

    /* ── TABS ── */
    .tabs{
      display:flex;
      margin:0 32px;
      border-bottom:1px solid var(--border);
    }
    .tab{
      flex:1;padding:14px 8px;
      font-family:var(--sc);font-size:11px;letter-spacing:0.18em;
      background:none;border:none;cursor:pointer;
      color:var(--muted);border-bottom:2px solid transparent;
      margin-bottom:-1px;transition:color .2s,border-color .2s;
    }
    .tab.on{color:var(--teal);border-bottom-color:var(--teal)}

    /* ── MAIN ── */
    .main{padding:28px 32px 40px}

    /* progress pips */
    .pips{display:flex;gap:7px;justify-content:center;margin-bottom:26px}
    .pip-bar{height:3px;width:30px;background:var(--sand);transition:all .3s}
    .pip-bar.on{background:var(--teal-m);width:40px}
    .pip-bar.seen{background:var(--teal-l)}
    .pip-bar.bad{background:#d4a0a0}

    /* clue stage area */
    .clue-wrap{overflow:hidden;margin-bottom:14px}
    .clue-track{display:flex;transition:transform .38s cubic-bezier(.4,0,.2,1)}
    .clue-slide{min-width:100%}

    .clue{
      padding:36px 40px;
      min-height:148px;
      display:flex;flex-direction:column;justify-content:center;
      border-top:2px solid var(--teal-l);
      border-bottom:1px solid var(--border);
      background:rgba(225,245,238,0.28);
      position:relative;
    }
    .clue.wrong{
      background:rgba(210,180,180,0.18);
      border-top-color:#d4a0a0;
    }
    .clue.past{
      background:transparent;
      border-top-color:var(--sand);
      opacity:.7;
    }
    .clue-cat{
      font-family:var(--sc);font-size:9px;letter-spacing:0.22em;
      color:var(--teal);margin-bottom:11px;display:block;
    }
    .clue.wrong .clue-cat{color:#b07070}
    .clue.past .clue-cat{color:var(--muted)}
    .clue-text{
      font-size:21px;font-weight:300;font-style:italic;
      line-height:1.55;color:var(--ink);
    }

    /* nav */
    .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;min-height:28px}
    .nav-btn{
      font-family:var(--sc);font-size:10px;letter-spacing:0.14em;
      background:none;border:none;cursor:pointer;color:var(--muted);
      padding:4px 0;transition:color .2s;
    }
    .nav-btn:hover{color:var(--teal)}
    .nav-btn:disabled{opacity:.2;cursor:default}
    .nav-hint{font-size:10px;font-style:italic;color:var(--sand);font-family:var(--sc);letter-spacing:.08em}

    /* guess */
    .sep{height:1px;background:var(--border);margin-bottom:18px}
    .glabel{font-family:var(--sc);font-size:9px;letter-spacing:.22em;color:var(--muted);margin-bottom:9px}
    .grow{display:flex;gap:9px;position:relative}
    .gwrap{flex:1;position:relative}
    .ginput{
      width:100%;padding:12px 16px;
      border:1px solid var(--sand);
      background:rgba(255,255,255,0.7);
      font-family:var(--serif);font-size:16px;font-weight:300;
      color:var(--ink);outline:none;
      transition:border-color .2s;
    }
    .ginput:focus{border-color:var(--teal-m)}
    .ginput::placeholder{color:var(--sand);font-style:italic}
    .gbtn{
      background:var(--teal);color:#fff;border:none;
      padding:12px 22px;cursor:pointer;
      font-family:var(--sc);font-size:11px;letter-spacing:.14em;
      transition:background .2s;white-space:nowrap;
    }
    .gbtn:hover{background:var(--teal-m)}

    /* suggestions */
    .sugs{
      position:absolute;top:calc(100% + 3px);left:0;right:0;
      background:#fff;border:1px solid var(--sand);
      z-index:20;max-height:150px;overflow-y:auto;
    }
    .sug{padding:10px 16px;font-family:var(--serif);font-size:14px;font-style:italic;cursor:pointer;color:var(--ink);border-bottom:1px solid var(--border)}
    .sug:last-child{border-bottom:none}
    .sug:hover{background:var(--teal-ll);color:var(--teal)}

    /* wrong guesses */
    .wrongs{margin-top:12px;display:flex;flex-direction:column;gap:5px}
    .wguess{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);font-style:italic}
    .wdot{width:4px;height:4px;flex-shrink:0;background:#d4a0a0}

    /* attempt pips */
    .arow{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .aleft{font-family:var(--sc);font-size:10px;letter-spacing:.1em;color:var(--muted)}
    .apips{display:flex;gap:5px}
    .apip{width:8px;height:8px;background:var(--teal-l)}
    .apip.used{background:#d4a0a0}

    /* result */
    .result{
      padding:32px 40px;text-align:center;
      border-top:2px solid var(--teal-l);
      background:rgba(225,245,238,0.3);
      margin-top:2px;
    }
    .result.bad{border-top-color:#d4a0a0;background:rgba(210,180,180,0.15)}
    .rlabel{font-family:var(--sc);font-size:9px;letter-spacing:.22em;color:var(--teal);margin-bottom:10px}
    .result.bad .rlabel{color:#b07070}
    .rtitle{font-size:28px;font-weight:300;font-style:italic;color:var(--ink);margin-bottom:5px}
    .rsub{font-size:13px;color:var(--muted);font-style:italic}

    .bonus{
      display:block;width:100%;margin-top:14px;
      background:none;border:1px solid var(--teal-l);
      padding:12px;cursor:pointer;font-family:var(--sc);
      font-size:11px;letter-spacing:.14em;color:var(--teal);
      transition:all .2s;
    }
    .bonus:hover{background:var(--teal-ll)}

    /* elea overlay */
    .elea{
      display:none;position:fixed;inset:0;
      background:var(--teal);
      align-items:center;justify-content:center;
      flex-direction:column;text-align:center;padding:40px;z-index:100;
    }
    .elea.on{display:flex}
    .elea-name{font-family:var(--sc);font-size:60px;font-weight:300;letter-spacing:.26em;color:#fff;margin-bottom:18px}
    .elea-msg{font-family:var(--serif);font-size:19px;font-weight:300;font-style:italic;line-height:1.8;color:rgba(255,255,255,.82);max-width:320px}
    .elea-x{margin-top:28px;background:none;border:1px solid rgba(255,255,255,.35);padding:10px 30px;color:rgba(255,255,255,.7);font-family:var(--sc);font-size:11px;letter-spacing:.14em;cursor:pointer;transition:all .2s}
    .elea-x:hover{border-color:#fff;color:#fff}

    @media(max-width:520px){
      .app{padding-top:0}
      .main,.header{padding-left:20px;padding-right:20px}
      .rule,.tabs{margin-left:20px;margin-right:20px}
      .clue{padding:28px 24px}
      .logo{font-size:34px}
    }
  </style>
</head>

  {n:"Spartacus",c:[{t:"Origine",x:"Russie · compositeur arménien"},{t:"Époque",x:"Créé en 1956"},{t:"Chorégraphie",x:"Yuri Grigorovich"},{t:"Synopsis",x:"Un esclave gladiateur mène une révolte contre l'oppression de Rome"},{t:"Indice final",x:"Spartacus affronte Crassus dans une lutte épique pour la liberté des esclaves"}]},
  {n:"L'Oiseau de Feu",c:[{t:"Origine",x:"Russie · compositeur russe"},{t:"Époque",x:"Créé en 1910"},{t:"Chorégraphie",x:"Michel Fokine"},{t:"Synopsis",x:"Un prince capture un oiseau magique qui l'aide à triompher d'un sorcier maléfique"},{t:"Indice final",x:"Ivan Tsarévitch capture l'Oiseau de Feu, qui l'aide à vaincre Kostcheï l'immortel"}]},
  {n:"Manon",c:[{t:"Origine",x:"Royaume-Uni · compositeur français"},{t:"Époque",x:"Créé en 1974"},{t:"Chorégraphie",x:"Kenneth MacMillan"},{t:"Synopsis",x:"Une jeune femme déchirée entre amour sincère et désir de richesse"},{t:"Indice final",x:"Manon choisit la luxure plutôt que Des Grieux, et finit tragiquement déportée en Louisiane"}]},
  {n:"Le Corsaire",c:[{t:"Origine",x:"France · compositeur français"},{t:"Époque",x:"Créé en 1856 (version Petipa)"},{t:"Chorégraphie",x:"Marius Petipa"},{t:"Synopsis",x:"Un pirate s'éprend d'une esclave et brave le danger pour la libérer"},{t:"Indice final",x:"Conrad le corsaire affronte tempêtes et marchands d'esclaves pour sauver Medora"}]},
];
const D=[
  {n:"Rudolf Noureev",c:[{t:"Origine",x:"Né en Russie soviétique"},{t:"Compagnie",x:"Ballet Kirov, puis Royal Ballet et l'Opéra de Paris"},{t:"Direction",x:"Directeur de la danse de l'Opéra de Paris (1983–1989)"},{t:"Fait marquant",x:"A fait défection en Occident à Paris en 1961"},{t:"Indice final",x:"A révolutionné le rôle masculin dans Le Lac des Cygnes et La Belle au Bois Dormant"}]},
  {n:"Sylvie Guillem",c:[{t:"Origine",x:"Née en France"},{t:"Compagnie",x:"Opéra National de Paris, puis Royal Ballet de Londres"},{t:"Titre",x:"Nommée danseuse étoile par Noureev à seulement 19 ans"},{t:"Fait marquant",x:"Connue pour une souplesse et une technique hors du commun"},{t:"Indice final",x:"A incarné Giselle et Juliette de façon iconique avant de se tourner vers la danse contemporaine"}]},
  {n:"Mikhail Baryshnikov",c:[{t:"Origine",x:"Né en Lettonie soviétique"},{t:"Compagnie",x:"Ballet Kirov, puis American Ballet Theatre"},{t:"Direction",x:"Directeur artistique de l'American Ballet Theatre (1980–1989)"},{t:"Fait marquant",x:"A fait défection en Occident au Canada en 1974"},{t:"Indice final",x:"Considéré comme l'un des plus grands danseurs classiques du XXe siècle"}]},
  {n:"Margot Fonteyn",c:[{t:"Origine",x:"Née en Angleterre"},{t:"Compagnie",x:"Royal Ballet de Londres"},{t:"Partenaire",x:"Partenariat légendaire avec Rudolf Noureev"},{t:"Fait marquant",x:"Première ballerine britannique à atteindre une renommée mondiale"},{t:"Indice final",x:"A dansé Aurore, Juliette et Giselle avec une grâce incomparable jusqu'à 50 ans"}]},
  {n:"Marie-Agnès Gillot",c:[{t:"Origine",x:"Née en France"},{t:"Compagnie",x:"Opéra National de Paris"},{t:"Titre",x:"Nommée danseuse étoile en 2004 par Brigitte Lefèvre"},{t:"Fait marquant",x:"Connue pour sa grande stature et sa présence scénique exceptionnelle"},{t:"Indice final",x:"A interprété des rôles iconiques de l'Opéra de Paris pendant plus de 20 ans"}]},
  {n:"Aurélie Dupont",c:[{t:"Origine",x:"Née en France"},{t:"Compagnie",x:"Opéra National de Paris"},{t:"Direction",x:"Directrice de la danse de l'Opéra de Paris depuis 2016"},{t:"Fait marquant",x:"Nommée étoile en 1998, reconnue pour son élégance naturelle"},{t:"Indice final",x:"A incarné Manon, Giselle et Juliette parmi ses rôles les plus célébrés à l'Opéra de Paris"}]},
];

let mode='ballet',vi={ballet:0,dancer:0};
const st={ballet:{ci:0,g:[],done:false,won:false},dancer:{ci:0,g:[],done:false,won:false}};

const today=()=>new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
const dIdx=a=>{const d=new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000)%a.length;};
const it=()=>mode==='ballet'?B[dIdx(B)]:D[dIdx(D)];
const s=()=>st[mode];
const norm=v=>v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();

function setMode(m,el){mode=m;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');render();}
function slide(d){const ss=s();vi[mode]=Math.max(0,Math.min(ss.ci,vi[mode]+d));track();nav();}

function submit(){
  const i=document.getElementById('gi');const v=i.value.trim();if(!v)return;
  const ss=s();const item=it();
  if(norm(v)===norm(item.n)){ss.done=true;ss.won=true;}
  else{ss.g.push(v);if(ss.ci<4)ss.ci++;else{ss.done=true;ss.won=false;}vi[mode]=ss.ci;}
  i.value='';hsug();render();
}

function hsug(){const s=document.getElementById('sug');if(s)s.remove();}
function ssug(v){
  hsug();if(!v||v.length<2)return;
  const list=mode==='ballet'?B:D;const seen=new Set();
  const m=list.filter(b=>{if(norm(b.n).includes(norm(v))&&!seen.has(b.n)){seen.add(b.n);return true;}return false;});
  if(!m.length)return;
  const w=document.getElementById('gw');const el=document.createElement('div');el.className='sugs';el.id='sug';
  m.forEach(x=>{const d=document.createElement('div');d.className='sug';d.textContent=x.n;d.onmousedown=()=>{document.getElementById('gi').value=x.n;hsug();};el.appendChild(d);});
  w.appendChild(el);
}

function track(){const t=document.getElementById('ct');if(t)t.style.transform=`translateX(-${vi[mode]*100}%)`;}
function nav(){
  const ss=s();const v=vi[mode];
  const p=document.getElementById('pv');const n=document.getElementById('nx');const h=document.getElementById('nh');
  if(p)p.disabled=v===0;if(n)n.disabled=v>=ss.ci;if(h)h.textContent=(ss.ci>0&&v<ss.ci)?'Indice actuel →':'';
}

function render(){
  const item=it();const ss=s();
  document.getElementById('datePill').textContent=today();
  let h='';

  h+=`<div class="pips">`;
  for(let i=0;i<=4;i++){let c='pip-bar';if(i<ss.ci)c+=' seen';else if(i===ss.ci&&!ss.done)c+=' on';else if(i===ss.ci&&ss.done&&!ss.won)c+=' bad';h+=`<div class="${c}"></div>`;}
  h+=`</div>`;

  h+=`<div class="clue-wrap"><div class="clue-track" id="ct">`;
  for(let i=0;i<=ss.ci;i++){
    const cl=item.c[i];let cc='clue';
    if(i===ss.ci&&!ss.done)cc='clue';
    else if(i===ss.ci&&ss.done&&!ss.won)cc='clue wrong';
    else cc='clue past';
    h+=`<div class="clue-slide"><div class="${cc}"><span class="clue-cat">${cl.t}</span><div class="clue-text">${cl.x}</div></div></div>`;
  }
  h+=`</div></div>`;

  if(ss.ci>0){
    h+=`<div class="nav"><button class="nav-btn" id="pv" onclick="slide(-1)">← Précédent</button><span class="nav-hint" id="nh"></span><button class="nav-btn" id="nx" onclick="slide(1)">Suivant →</button></div>`;
  } else h+=`<div style="height:12px"></div>`;

  if(!ss.done){
    h+=`<div class="sep"></div><div class="glabel">Votre réponse</div>`;
    h+=`<div class="grow"><div class="gwrap" id="gw"><input class="ginput" id="gi" placeholder="Nommez ce ${mode==='ballet'?'ballet':'danseur'}…" autocomplete="off"></div><button class="gbtn" onclick="submit()">Valider</button></div>`;
    if(ss.g.length){h+=`<div class="wrongs">`;ss.g.forEach(g=>h+=`<div class="wguess"><div class="wdot"></div>${g}</div>`);h+=`</div>`;}
    const rem=5-ss.g.length;
    h+=`<div class="arow"><div class="aleft">${rem} tentative${rem>1?'s':''} restante${rem>1?'s':''}</div><div class="apips">`;
    for(let i=0;i<5;i++)h+=`<div class="apip${i<ss.g.length?' used':''}"></div>`;
    h+=`</div></div>`;
  }

  if(ss.done){
    h+=`<div class="result${ss.won?'':' bad'}"><div class="rlabel">${ss.won?'Bravo !':'La réponse était…'}</div><div class="rtitle">${item.n}</div>`;
    if(ss.won)h+=`<div class="rsub">Trouvé en ${ss.g.length+1} tentative${ss.g.length!==0?'s':''}</div>`;
    h+=`</div>`;
    if(mode==='ballet')h+=`<button class="bonus" onclick="toD()">Le danseur du jour →</button>`;
  }

  document.getElementById('main').innerHTML=h;
  track();nav();

  let sx=null;
  const vp=document.querySelector('.clue-wrap');
  if(vp){
    vp.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
    vp.addEventListener('touchend',e=>{if(sx===null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)slide(dx<0?1:-1);sx=null;},{passive:true});
  }

  const gi=document.getElementById('gi');
  if(gi){
    gi.addEventListener('input',e=>{ssug(e.target.value);if(norm(e.target.value)==='elea')setTimeout(()=>document.getElementById('elea').classList.add('on'),200);});
    gi.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
    gi.addEventListener('blur',()=>setTimeout(hsug,150));
  }
}

function toD(){mode='dancer';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.getElementById('t1').classList.add('on');render();}

render();
</script>
</body>
</html>
