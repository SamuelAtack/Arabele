<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ballet Quotidien</title>
  <meta name="description" content="Le jeu quotidien du ballet classique">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #1D9E75;
      --teal-l: #E1F5EE;
      --teal-ll: #9FE1CB;
      --teal-d: #085041;
      --pink: #f3dce4;
      --pink-m: #f0a3b1;
      --rose-d: #72243E;
      --pirouette: #f7b7d0;
      --jade-l: #e0f5ee;
      --jade: #006f4f;
      --orange: #E8732A;
      --orange-l: #fdeee4;
      --orange-ll: #f8c9a0;
      --gold: #BA7517;
      --ink: #2C2C2A;
      --muted: #888780;
      --border: rgba(44,44,42,0.12);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sc: 'Cormorant SC', Georgia, serif;
      --bg: #faf7f4;
    }

    body {
      background: var(--bg);
      font-family: var(--serif);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .app {
      background: var(--bg);
      border-radius: 20px;
      border: 0.5px solid var(--border);
      overflow: hidden;
      color: var(--ink);
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 24px rgba(44,44,42,0.07);
    }

    .header {
      background: #fff;
      border-bottom: 0.5px solid var(--border);
      padding: 20px 24px 16px;
      text-align: center;
      position: relative;
    }
    .logo {
      font-family: var(--sc);
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--ink);
    }
    .logo-dot { color: var(--teal); }
    .tagline {
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--muted);
      margin-top: 3px;
      font-style: italic;
    }
    .date-pill {
      position: absolute;
      right: 18px;
      top: 24px;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-family: var(--sc);
      font-weight: 300;
    }

    .mode-tabs {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      background: #fff;
    }
    .mode-tab {
      flex: 1;
      padding: 11px;
      font-family: var(--sc);
      font-size: 11px;
      letter-spacing: 0.14em;
      font-weight: 300;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .mode-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    .main { padding: 22px 20px 28px; }

    .step-indicators {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .step-dot {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      background: #e8e5e0;
      transition: all 0.3s;
    }
    .step-dot.revealed { background: var(--teal-ll); }
    .step-dot.active-dot { background: var(--teal); width: 36px; }
    .step-dot.wrong { background: var(--pink-m); }

    .clue-viewport { overflow: hidden; position: relative; margin-bottom: 16px; }
    .clue-track { display: flex; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .clue-slide { min-width: 100%; padding: 0 2px; }

    .clue-card {
      border-radius: 12px;
      padding: 18px 20px;
      border: 0.5px solid var(--border);
      background: #fff;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .clue-card.active-card { border-color: var(--teal-ll); border-left: 3px solid var(--teal); }
    .clue-card.wrong-card { background: var(--pink); border-color: var(--pink-m); }
    .clue-card.past-card { background: #fff; opacity: 0.85; }

    .clue-tag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.16em;
      font-family: var(--sc);
      font-weight: 400;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .active-card .clue-tag { background: var(--teal-l); color: var(--teal-d); }
    .wrong-card .clue-tag { background: var(--pirouette); color: var(--rose-d); }
    .past-card .clue-tag { background: #f0ede8; color: #888; }

    .clue-body {
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      line-height: 1.55;
      color: var(--ink);
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .nav-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--sc);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: #f0ede8; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-hint { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); font-family: var(--sc); font-style: italic; }

    .divider { height: 0.5px; background: var(--border); margin: 4px 0 18px; }

    .guess-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-family: var(--sc);
      font-weight: 300;
      margin-bottom: 8px;
    }
    .guess-row { display: flex; gap: 8px; position: relative; }
    .guess-wrapper { flex: 1; position: relative; }
    .guess-input {
      width: 100%;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 300;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .guess-input:focus { border-color: var(--teal); }
    .guess-input::placeholder { color: #ccc; font-style: italic; }

    .guess-btn {
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: var(--sc);
      font-size: 11px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .guess-btn:hover { background: var(--teal-d); }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 0.5px solid var(--border);
      border-radius: 8px;
      z-index: 20;
      max-height: 160px;
      overflow-y: auto;
    }
    .sug-item {
      padding: 10px 14px;
      font-family: var(--serif);
      font-size: 14px;
      font-style: italic;
      cursor: pointer;
      color: var(--ink);
      border-bottom: 0.5px solid var(--border);
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover { background: var(--teal-l); color: var(--teal-d); }

    .past-guesses { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .past-guess { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); font-style: italic; }
    .pg-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink-m); flex-shrink: 0; }

    .attempts-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .attempts-left { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; font-family: var(--sc); font-weight: 300; }
    .attempt-pips { display: flex; gap: 4px; }
    .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--teal-ll); }
    .pip.used { background: var(--pink-m); }

    .result-banner {
      border-radius: 12px;
      padding: 24px 20px;
      text-align: center;
      margin-top: 4px;
    }
    .result-banner.win { background: var(--jade-l); border: 0.5px solid var(--teal-ll); }
    .result-banner.lose { background: var(--pink); border: 0.5px solid var(--pink-m); }
    .rb-label { font-size: 10px; letter-spacing: 0.2em; font-family: var(--sc); font-weight: 300; margin-bottom: 8px; }
    .result-banner.win .rb-label { color: var(--jade); }
    .result-banner.lose .rb-label { color: var(--rose-d); }
    .rb-title { font-size: 26px; font-weight: 300; font-style: italic; margin-bottom: 4px; color: var(--ink); }
    .rb-sub { font-size: 13px; color: var(--muted); font-style: italic; }

    .bonus-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      background: transparent;
      border: 0.5px solid var(--teal);
      border-radius: 8px;
      padding: 11px;
      font-family: var(--sc);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--teal);
      cursor: pointer;
      transition: all 0.2s;
    }
    .bonus-btn:hover { background: var(--teal-l); }

    .elea-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #085041;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px;
      z-index: 100;
    }
    .elea-overlay.vis { display: flex; }
    .elea-title { font-family: var(--sc); font-size: 56px; font-weight: 300; letter-spacing: 0.22em; color: #9FE1CB; margin-bottom: 16px; }
    .elea-msg { font-family: var(--serif); font-size: 20px; font-weight: 300; font-style: italic; line-height: 1.8; color: rgba(255,255,255,0.85); max-width: 320px; }
    .elea-close { margin-top: 28px; background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 11px 32px; color: #fff; font-family: var(--sc); font-size: 11px; letter-spacing: 0.14em; cursor: pointer; }

    @media (max-width: 480px) {
      body { padding: 0; }
      .app { border-radius: 0; border: none; min-height: 100vh; max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="elea-overlay" id="eleaOverlay">
  <div class="elea-title">Elea</div>
  <div class="elea-msg">Ce jeu a été créé rien que pour toi, avec tout l'amour du monde.</div>
  <button class="elea-close" onclick="document.getElementById('eleaOverlay').classList.remove('vis')">Fermer</button>
</div>

<div class="app">
  <div class="header">
    <div class="date-pill" id="datePill"></div>
    <div class="logo">Ballet<span class="logo-dot">·</span>Quotidien</div>
    <div class="tagline">Le jeu quotidien du ballet classique</div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabBallet" onclick="setMode('ballet',this)">Le Ballet</button>
    <button class="mode-tab" id="tabDancer" onclick="setMode('dancer',this)">Le Danseur</button>
  </div>

  <div class="main" id="mainContent"></div>
</div>

<script>
const BALLETS = [
  { name: "Le Lac des Cygnes", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1877" },
    { tag: "Chorégraphie", text: "Petipa & Lev Ivanov" },
    { tag: "Synopsis", text: "Une jeune femme ensorcelée prend la forme d'un oiseau à la nuit tombée" },
    { tag: "Indice final", text: "Un prince tombe amoureux d'Odette, ensorcelée par le maléfique Von Rothbart" }
  ]},
  { name: "Giselle", clues: [
    { tag: "Origine", text: "France · compositeur franco-allemand" },
    { tag: "Époque", text: "Créé en 1841" },
    { tag: "Chorégraphie", text: "Jean Coralli & Jules Perrot" },
    { tag: "Synopsis", text: "Une paysanne meurt de chagrin après avoir été trahie par son amant" },
    { tag: "Indice final", text: "Giselle, devenue Wili, protège Albrecht des esprits vengeurs des jeunes filles mortes" }
  ]},
  { name: "La Belle au Bois Dormant", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1890" },
    { tag: "Chorégraphie", text: "Marius Petipa" },
    { tag: "Synopsis", text: "Une princesse est plongée dans un sommeil éternel par une malédiction" },
    { tag: "Indice final", text: "Aurore, maudite par la fée Carabosse, attend le baiser libérateur du prince Désiré" }
  ]},
  { name: "Casse-Noisette", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1892" },
    { tag: "Chorégraphie", text: "Lev Ivanov" },
    { tag: "Synopsis", text: "Une petite fille part en voyage magique lors de la nuit de Noël" },
    { tag: "Indice final", text: "Clara et son Casse-Noisette traversent le Pays des Sucreries et rencontrent la Fée Dragée" }
  ]},
  { name: "Roméo et Juliette", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1938" },
    { tag: "Chorégraphie", text: "Leonid Lavrovsky" },
    { tag: "Synopsis", text: "Deux jeunes gens de familles ennemies s'éprennent éperdument l'un de l'autre" },
    { tag: "Indice final", text: "L'amour de Roméo et Juliette se brise sur la haine des Montaigu et Capulet" }
  ]},
  { name: "La Bayadère", clues: [
    { tag: "Origine", text: "Inde (cadre) · compositeur autrichien" },
    { tag: "Époque", text: "Créé en 1877" },
    { tag: "Chorégraphie", text: "Marius Petipa" },
    { tag: "Synopsis", text: "Une danseuse sacrée est trahie par son amant qui épouse une princesse" },
    { tag: "Indice final", text: "Nikiya périt et hante le Royaume des Ombres, attendant éternellement Solor" }
  ]},
  { name: "Don Quichotte", clues: [
    { tag: "Origine", text: "Espagne (cadre) · compositeur autrichien" },
    { tag: "Époque", text: "Créé en 1869" },
    { tag: "Chorégraphie", text: "Marius Petipa" },
    { tag: "Synopsis", text: "Une aubergiste espiègle cherche à épouser l'homme qu'elle aime malgré son père" },
    { tag: "Indice final", text: "Kitri et Basilio rusent pour s'unir, sous le regard bienveillant de Don Quichotte" }
  ]},
  { name: "Cendrillon", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1945" },
    { tag: "Chorégraphie", text: "Rostislav Zakharov" },
    { tag: "Synopsis", text: "Une jeune femme maltraitée rêve d'aller au bal grâce à une fée bienveillante" },
    { tag: "Indice final", text: "Cendrillon perd sa pantoufle à minuit et le prince part à sa recherche à travers le monde" }
  ]},
  { name: "Spartacus", clues: [
    { tag: "Origine", text: "Russie · compositeur arménien" },
    { tag: "Époque", text: "Créé en 1956" },
    { tag: "Chorégraphie", text: "Yuri Grigorovich" },
    { tag: "Synopsis", text: "Un esclave gladiateur mène une révolte contre l'oppression de Rome" },
    { tag: "Indice final", text: "Spartacus affronte Crassus dans une lutte épique pour la liberté des esclaves" }
  ]},
  { name: "L'Oiseau de Feu", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1910" },
    { tag: "Chorégraphie", text: "Michel Fokine" },
    { tag: "Synopsis", text: "Un prince capture un oiseau magique qui l'aide à triompher d'un sorcier maléfique" },
    { tag: "Indice final", text: "Ivan Tsarévitch capture l'Oiseau de Feu, qui l'aide à vaincre Kostcheï l'immortel" }
  ]},
  { name: "Roméo et Juliette", clues: [
    { tag: "Origine", text: "Russie · compositeur russe" },
    { tag: "Époque", text: "Créé en 1938" },
    { tag: "Chorégraphie", text: "Leonid Lavrovsky" },
    { tag: "Synopsis", text: "Deux jeunes gens de familles ennemies s'éprennent éperdument l'un de l'autre" },
    { tag: "Indice final", text: "L'amour de Roméo et Juliette se brise sur la haine des Montaigu et Capulet" }
  ]},
  { name: "Manon", clues: [
    { tag: "Origine", text: "Royaume-Uni · compositeur français" },
    { tag: "Époque", text: "Créé en 1974" },
    { tag: "Chorégraphie", text: "Kenneth MacMillan" },
    { tag: "Synopsis", text: "Une jeune femme déchirée entre amour sincère et désir de richesse" },
    { tag: "Indice final", text: "Manon choisit la luxure plutôt que Des Grieux, et finit tragiquement déportée en Louisiane" }
  ]},
];

const DANCERS = [
  { name: "Rudolf Noureev", clues: [
    { tag: "Origine", text: "Né en Russie soviétique" },
    { tag: "Compagnie", text: "Ballet Kirov, puis Royal Ballet et l'Opéra de Paris" },
    { tag: "Direction", text: "Directeur de la danse de l'Opéra de Paris (1983–1989)" },
    { tag: "Fait marquant", text: "A fait défection en Occident à Paris en 1961" },
    { tag: "Indice final", text: "A révolutionné le rôle masculin dans Le Lac des Cygnes et La Belle au Bois Dormant" }
  ]},
  { name: "Sylvie Guillem", clues: [
    { tag: "Origine", text: "Née en France" },
    { tag: "Compagnie", text: "Opéra National de Paris, puis Royal Ballet de Londres" },
    { tag: "Titre", text: "Nommée danseuse étoile par Noureev à seulement 19 ans" },
    { tag: "Fait marquant", text: "Connue pour une souplesse et une technique hors du commun" },
    { tag: "Indice final", text: "A incarné Giselle et Juliette de façon iconique avant de se tourner vers la danse contemporaine" }
  ]},
  { name: "Mikhail Baryshnikov", clues: [
    { tag: "Origine", text: "Né en Lettonie soviétique" },
    { tag: "Compagnie", text: "Ballet Kirov, puis American Ballet Theatre" },
    { tag: "Direction", text: "Directeur artistique de l'American Ballet Theatre (1980–1989)" },
    { tag: "Fait marquant", text: "A fait défection en Occident au Canada en 1974" },
    { tag: "Indice final", text: "Considéré comme l'un des plus grands danseurs classiques du XXe siècle" }
  ]},
  { name: "Margot Fonteyn", clues: [
    { tag: "Origine", text: "Née en Angleterre" },
    { tag: "Compagnie", text: "Royal Ballet de Londres" },
    { tag: "Partenaire", text: "Partenariat légendaire avec Rudolf Noureev" },
    { tag: "Fait marquant", text: "Première ballerine britannique à atteindre une renommée mondiale" },
    { tag: "Indice final", text: "A dansé Aurore, Juliette et Giselle avec une grâce incomparable jusqu'à 50 ans" }
  ]},
  { name: "Marie-Agnès Gillot", clues: [
    { tag: "Origine", text: "Née en France" },
    { tag: "Compagnie", text: "Opéra National de Paris" },
    { tag: "Titre", text: "Nommée danseuse étoile en 2004 par Brigitte Lefèvre" },
    { tag: "Fait marquant", text: "Connue pour sa grande stature et sa présence scénique exceptionnelle" },
    { tag: "Indice final", text: "A interprété des rôles iconiques de l'Opéra de Paris pendant plus de 20 ans" }
  ]},
  { name: "Aurélie Dupont", clues: [
    { tag: "Origine", text: "Née en France" },
    { tag: "Compagnie", text: "Opéra National de Paris" },
    { tag: "Direction", text: "Directrice de la danse de l'Opéra de Paris depuis 2016" },
    { tag: "Fait marquant", text: "Nommée étoile en 1998, reconnue pour son élégance naturelle" },
    { tag: "Indice final", text: "A incarné Manon, Giselle et Juliette parmi ses rôles les plus célébrés à l'Opéra de Paris" }
  ]},
];

let mode = 'ballet';
let viewIdx = { ballet: 0, dancer: 0 };
const states = {
  ballet: { ci: 0, guesses: [], done: false, won: false },
  dancer: { ci: 0, guesses: [], done: false, won: false }
};

function today() {
  return new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
}

function dayIdx(arr) {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000) % arr.length;
}

function item() {
  return mode === 'ballet' ? BALLETS[dayIdx(BALLETS)] : DANCERS[dayIdx(DANCERS)];
}

function st() { return states[mode]; }

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s]/g, '').trim();
}

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function goSlide(dir) {
  const s = st();
  viewIdx[mode] = Math.max(0, Math.min(s.ci, viewIdx[mode] + dir));
  renderTrack();
  renderNav();
}

function submit() {
  const inp = document.getElementById('gi');
  const val = inp.value.trim();
  if (!val) return;
  const s = st(); const it = item();
  if (norm(val) === norm(it.name)) {
    s.done = true; s.won = true;
  } else {
    s.guesses.push(val);
    if (s.ci < 4) { s.ci++; }
    else { s.done = true; s.won = false; }
    viewIdx[mode] = s.ci;
  }
  inp.value = '';
  hideSug();
  render();
}

function hideSug() { const s = document.getElementById('sug'); if (s) s.remove(); }

function showSug(v) {
  hideSug();
  if (!v || v.length < 2) return;
  const list = mode === 'ballet' ? BALLETS : DANCERS;
  const seen = new Set();
  const matches = list.filter(b => {
    if (norm(b.name).includes(norm(v)) && !seen.has(b.name)) { seen.add(b.name); return true; }
    return false;
  });
  if (!matches.length) return;
  const wrap = document.getElementById('gw');
  const s = document.createElement('div'); s.className = 'suggestions'; s.id = 'sug';
  matches.forEach(m => {
    const d = document.createElement('div'); d.className = 'sug-item'; d.textContent = m.name;
    d.onmousedown = () => { document.getElementById('gi').value = m.name; hideSug(); };
    s.appendChild(d);
  });
  wrap.appendChild(s);
}

function renderTrack() {
  const track = document.getElementById('clueTrack');
  if (!track) return;
  track.style.transform = `translateX(-${viewIdx[mode] * 100}%)`;
}

function renderNav() {
  const s = st();
  const vi = viewIdx[mode];
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const hint = document.getElementById('navHint');
  if (prevBtn) prevBtn.disabled = vi === 0;
  if (nextBtn) nextBtn.disabled = vi >= s.ci;
  if (hint) hint.textContent = (s.ci > 0 && vi < s.ci) ? 'Indice actuel →' : '';
}

function render() {
  const it = item(); const s = st();
  document.getElementById('datePill').textContent = today();

  let h = '';

  h += `<div class="step-indicators">`;
  for (let i = 0; i <= 4; i++) {
    let cls = 'step-dot';
    if (i < s.ci) cls += ' revealed';
    else if (i === s.ci && !s.done) cls += ' active-dot';
    else if (i === s.ci && s.done && !s.won) cls += ' wrong';
    h += `<div class="${cls}"></div>`;
  }
  h += `</div>`;

  h += `<div class="clue-viewport"><div class="clue-track" id="clueTrack">`;
  for (let i = 0; i <= s.ci; i++) {
    const clue = it.clues[i];
    let cardCls = 'clue-card';
    if (i === s.ci && !s.done) cardCls += ' active-card';
    else if (i === s.ci && s.done && !s.won) cardCls += ' wrong-card';
    else cardCls += ' past-card';
    h += `<div class="clue-slide"><div class="${cardCls}"><span class="clue-tag">${clue.tag}</span><div class="clue-body">${clue.text}</div></div></div>`;
  }
  h += `</div></div>`;

  if (s.ci > 0) {
    h += `<div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="goSlide(-1)">← Précédent</button>
      <span class="nav-hint" id="navHint"></span>
      <button class="nav-btn" id="nextBtn" onclick="goSlide(1)">Suivant →</button>
    </div>`;
  } else {
    h += `<div style="height:8px"></div>`;
  }

  if (!s.done) {
    h += `<div class="divider"></div>`;
    h += `<div class="guess-label">Votre réponse</div>`;
    h += `<div class="guess-row"><div class="guess-wrapper" id="gw"><input class="guess-input" id="gi" placeholder="Nommez ce ${mode === 'ballet' ? 'ballet' : 'danseur'}…" autocomplete="off"></div><button class="guess-btn" onclick="submit()">Valider</button></div>`;
    if (s.guesses.length) {
      h += `<div class="past-guesses">`;
      s.guesses.forEach(g => h += `<div class="past-guess"><div class="pg-dot"></div>${g}</div>`);
      h += `</div>`;
    }
    const rem = 5 - s.guesses.length;
    h += `<div class="attempts-row"><div class="attempts-left">${rem} tentative${rem > 1 ? 's' : ''} restante${rem > 1 ? 's' : ''}</div><div class="attempt-pips">`;
    for (let i = 0; i < 5; i++) h += `<div class="pip${i < s.guesses.length ? ' used' : ''}"></div>`;
    h += `</div></div>`;
  }

  if (s.done) {
    h += `<div class="result-banner ${s.won ? 'win' : 'lose'}">`;
    h += `<div class="rb-label">${s.won ? 'Bravo !' : 'La réponse était…'}</div>`;
    h += `<div class="rb-title">${it.name}</div>`;
    if (s.won) h += `<div class="rb-sub">Trouvé en ${s.guesses.length + 1} tentative${s.guesses.length !== 0 ? 's' : ''}</div>`;
    h += `</div>`;
    if (mode === 'ballet') h += `<button class="bonus-btn" onclick="switchDancer()">Le danseur du jour →</button>`;
  }

  document.getElementById('mainContent').innerHTML = h;
  renderTrack();
  renderNav();

  let startX = null;
  const vp = document.querySelector('.clue-viewport');
  if (vp) {
    vp.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    vp.addEventListener('touchend', e => {
      if (startX === null) return;
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) goSlide(dx < 0 ? 1 : -1);
      startX = null;
    }, { passive: true });
  }

  const gi = document.getElementById('gi');
  if (gi) {
    gi.addEventListener('input', e => {
      showSug(e.target.value);
      if (norm(e.target.value) === 'elea') setTimeout(() => document.getElementById('eleaOverlay').classList.add('vis'), 200);
    });
    gi.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    gi.addEventListener('blur', () => setTimeout(hideSug, 150));
  }
}

function switchDancer() {
  mode = 'dancer';
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabDancer').classList.add('active');
  render();
}

render();
</script>
</body>
</html>
